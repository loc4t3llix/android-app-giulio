name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      publish_release:
        description: Publish debug APK to GitHub Releases
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  build-debug:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GRADLE_OPTS: -Dorg.gradle.daemon=false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses > /dev/null

      - name: Install Android SDK packages
        run: |
          sdkmanager --install "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Verify Gradle installation
        run: gradle --version

      - name: Create google-services.json from secret
        if: ${{ secrets.GOOGLE_SERVICES_JSON != '' }}
        run: |
          cat > app/google-services.json <<'JSON'
          ${{ secrets.GOOGLE_SERVICES_JSON }}
          JSON

      - name: Validate google-services.json presence
        run: |
          if [ ! -f app/google-services.json ]; then
            echo "Missing app/google-services.json. Add local file for local builds or set GitHub secret GOOGLE_SERVICES_JSON for CI." >&2
            exit 1
          fi

      - name: Build debug APK
        run: gradle :app:assembleDebug --stacktrace --warning-mode all

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  publish-release:
    needs: build-debug
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_release == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download debug APK artifact
        uses: actions/download-artifact@v4
        with:
          name: app-debug-apk
          path: dist

      - name: Publish APK to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_id }}
          name: APK Release ${{ github.run_id }}
          generate_release_notes: true
          files: dist/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
